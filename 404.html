<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page introuvable — GAROMS-TECH</title>
<link rel="icon" href="https://raw.githubusercontent.com/toptechnn-debug/garoms-tech-assets/main/tab.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0A1628;color:#fff;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.wrap{max-width:480px;}
.code{font-size:6rem;font-weight:900;background:linear-gradient(135deg,#E85D04,#FB923C);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1;}
h1{font-size:1.5rem;font-weight:700;margin:1rem 0 .5rem;}
p{color:rgba(255,255,255,.5);font-size:.95rem;line-height:1.7;margin-bottom:2rem;}
.btn{display:inline-flex;align-items:center;gap:.5rem;background:linear-gradient(135deg,#E85D04,#FB923C);color:#fff;padding:.8rem 1.8rem;border-radius:999px;font-weight:700;font-size:.95rem;text-decoration:none;transition:.2s;}
.btn:hover{opacity:.9;transform:translateY(-2px);}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Page introuvable</h1>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour continuer.</p>
  <a href="/" class="btn">← Retour à l'accueil</a>
</div>
</body>
</html>
